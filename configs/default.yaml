# GoClaude 默认配置 —— 单一信息源（Single Source of Truth）
#
# 此文件定义所有"参数类"配置的默认值。运行时按以下优先级覆盖（先低后高）：
#   1) 此文件        configs/default.yaml      (与二进制一同发布的内置默认)
#   2) 用户级        ~/.goclaude/config.yaml   (个人偏好；可选)
#   3) 项目级        <project>/.goclaude.yaml  (团队共享或项目特定；可选)
#   4) CLI flags     --max-turns / --no-mcp ...等   (一次性临时覆盖)
#
# 所有"参数类"配置必须从此文件读取，不再使用环境变量。
# 唯一例外：API Key（凭证）走环境变量，避免进入版本库：
#   DEEPSEEK_API_KEY        DeepSeek API 密钥
#   ANTHROPIC_API_KEY       Anthropic API 密钥
#
# 修改本文件后无需重启编辑器；下次 `goclaude` 启动即生效。

# ═══════════════════════════════════════════════════════════════
# AI Provider 与模型参数
# ═══════════════════════════════════════════════════════════════
api:
  provider: deepseek                  # anthropic | deepseek
  model: deepseek-reasoner            # 默认模型；按 provider 自动回退
  max_tokens: 32768                   # 单次最大输出 token
  temperature: 1.0                    # 采样温度 (0.0 ~ 2.0)
  top_p: 1.0                          # 核采样
  stream: true                        # 是否使用流式响应

# 各 Provider 的传输与重试参数
providers:
  deepseek:
    base_url: https://api.deepseek.com   # 切代理 / 私有部署在此修改
    default_model: deepseek-chat         # deepseek-chat | deepseek-reasoner
    timeout: 300s
    max_retries: 3
    retry_base_delay: 1s
  anthropic:
    base_url: https://api.anthropic.com
    api_version: "2023-06-01"
    default_model: claude-sonnet-4-20250514
    timeout: 300s
    max_retries: 3
    retry_base_delay: 1s

# ═══════════════════════════════════════════════════════════════
# 查询引擎参数
# ═══════════════════════════════════════════════════════════════
engine:
  max_turns: 300                      # 单轮查询最大工具循环数
  token_budget: 200000                # 上下文 token 预算上限
  auto_compact: true                  # 自动压缩开关
  max_retries: 3
  retry_base_delay: 1s

# ═══════════════════════════════════════════════════════════════
# 工具配置
# ═══════════════════════════════════════════════════════════════
tools:
  max_concurrency: 10                 # 只读工具最大并发数
  max_result_size: 30000              # 工具结果最大字符数（超限持久化磁盘）
  timeout: 120s                       # 工具默认超时
  use_builtin_grep: false             # true=强制纯 Go grep；false=自动检测 rg

# ═══════════════════════════════════════════════════════════════
# MCP 子系统
# ═══════════════════════════════════════════════════════════════
mcp:
  enabled: true                       # 是否自动连接 MCP servers（--no-mcp 覆盖）
  connect_timeout: 30s
  request_timeout: 60s

# ═══════════════════════════════════════════════════════════════
# Agent-Teams 执行模式开关
# ═══════════════════════════════════════════════════════════════
# 控制子任务的执行方式。优先级（高→低）：
#   CLI --agent-teams > 环境变量 GOCLAUDE_AGENT_TEAMS > 本文件
#
# 环境变量 GOCLAUDE_AGENT_TEAMS 接受: true/false/1/0/yes/no（大小写不敏感）
# 示例: export GOCLAUDE_AGENT_TEAMS=true  # 动态切换到多智能体团队模式
#
#   enabled: true   多智能体团队协作（agent-teams）
#                   注册全部 team 工具（team_create / send_message /
#                   create_task / auto_assign_task ...），任务可由多个 agent
#                   组成的团队协同处理，leader 每轮自动同步成员进展。
#   enabled: false  单一子智能体（subagent）
#                   不注册任何 team 工具，主 agent 仅通过 Agent 工具把任务
#                   下发给单一 subagent 独立执行（上下文隔离）。
agent_teams:
  enabled: true

  # Team Engine — member worker goroutine 的运行时配置
  team_engine:
    # 单个任务最大工具循环轮数（0 表示用 agent 定义或引擎默认值 200）
    # team 任务可能涉及多文件操作和跨 worker 通信，推荐 >= 200
    max_turns: 0
    # inbox 轮询间隔（秒）
    poll_interval_sec: 5
    # 单个任务执行超时（分钟），0 表示不限制
    task_timeout_min: 5
    # 关闭 member 时等待退出的超时（秒）
    shutdown_timeout_sec: 30
    # member 最大并行任务数（当前固定为 1：串行执行）
    max_concurrent_tasks: 1

# ═══════════════════════════════════════════════════════════════
# 工作区 — 任务产物统一输出目录
# ═══════════════════════════════════════════════════════════════
# 所有 agent / workflow / team 执行生成的产物文件统一输出到此目录，
# 避免文件散落在项目各处。
#
# 路径解析规则：
#   - 绝对路径 → 原样使用
#   - ~/ 开头 → 相对于用户 HOME
#   - 相对路径 → 相对于工作目录（cwd / projectRoot）
workspace:
  # 默认：项目 ./workspaces/ 目录（相对于工作目录/项目根）
  # 所有产物文件直接写入此目录，无子目录
  dir: ./.goclaude/workspaces/
  # 自动创建目录（如不存在）
  auto_create: true

# ═══════════════════════════════════════════════════════════════
# 权限 / 审批策略
# ═══════════════════════════════════════════════════════════════
permissions:
  # default      每次写入前弹 [a]llow / [s]tay / [d]eny
  # acceptEdits  自动放行编辑类工具（推荐日常）
  # plan         拒绝所有写入（仅规划，不改文件）
  # bypass       跳过全部权限检查（极不安全；CI/沙箱专用）
  mode: bypass
  auto_approve_read: true             # 只读工具自动放行

# ═══════════════════════════════════════════════════════════════
# Bash 沙箱配置（Linux: bwrap / macOS: sandbox-exec）
# ═══════════════════════════════════════════════════════════════
sandbox:
  # 是否启用沙箱（默认关闭；需要手动开启）
  enabled: true

  # 文件系统读取限制
  filesystem_read:
    allow:
      - ./
      - "~/.goclaude"
    deny: []

  # 文件系统写入限制
  filesystem_write:
    allow:
      - ./
      - "~/.goclaude/tmp"
    deny:
      - "~/.ssh"
      - "~/.aws"
      - "~/.config/gcloud"

  # 网络限制
  network:
    # 是否禁用网络（true = 完全断网）
    disable_network: false
    # 允许的域名（disable_network=false 时生效）
    allowed_domains: []
    # 禁止的域名
    denied_domains: []
    # 是否允许 Unix socket（默认 false）
    allow_unix_sockets: false
    # 是否允许本地端口绑定（默认 true）
    allow_local_binding: true

  # 是否允许在不使用沙箱的情况下执行命令（默认 true）
  # 如果设为 false，所有命令必须使用沙箱（类似 fail_if_unavailable）
  allow_unsandboxed_commands: true

  # 排除在沙箱外的命令模式（前缀匹配，支持 * 通配符）
  excluded_commands:
    - "cd *"
    - "pwd"
    - "echo *"

  # 高级：允许较弱的嵌套沙箱（默认 false）
  enable_weaker_nested_sandbox: false

  # 忽略沙箱违规（不推荐，仅用于调试）
  ignore_violations: false

# ═══════════════════════════════════════════════════════════════
# 会话与记忆
# ═══════════════════════════════════════════════════════════════
session:
  history_dir: ~/.goclaude/sessions
  memory_file: MEMORY.md
  max_memory_lines: 200
  max_memory_bytes: 25000

# ═══════════════════════════════════════════════════════════════
# 长期记忆（Long-Term Memory）
# ═══════════════════════════════════════════════════════════════
# 基于 SQLite+FTS5 实现跨会话上下文记忆存储与检索。
# 对齐 claude-mem 的核心机制：渐进式三层搜索、生命周期钩子、隐私过滤。
longterm_memory:
  # 总开关：false 时长期记忆完全禁用，不影响现有 MEMORY.md 文件记忆
  enabled: true

  # 数据库文件路径（相对路径相对于 ~/.goclaude/）
  db_path: ~/.goclaude/longterm_memory.db

  # ───── 记忆捕获 ─────
  capture:
    # 是否在 PostToolUse 事件时自动捕获工具观察记录
    auto_capture_tools: true
    # 最大单条记忆大小（字节，超限截断）
    max_observation_size: 8000
    # 工具结果最小字符数才触发捕获（避免空结果/错误消息噪音）
    min_capture_chars: 50

  # ───── 上下文注入 ─────
  injection:
    # SessionStart 时自动检索并注入相关历史记忆
    auto_inject: true
    # 最大注入 token 数（防止超预算）
    max_inject_tokens: 2000
    # 检索返回的最大索引条目数
    search_limit: 10
    # 最小相关度评分阈值（0-1，低于此评分不注入）
    min_relevance_score: 0.2

  # ───── 容量管理 ─────
  capacity:
    # 最大记忆条目数
    max_entries: 1000
    # 最大存储字节数（默认 10MB）
    max_storage_bytes: 10485760

  # ───── 淘汰策略 ─────
  eviction:
    # 策略: "priority"（按综合评分淘汰低分条目） | "lru"（按最近访问淘汰）
    policy: priority
    # 淘汰前是否自动生成摘要压缩
    auto_summarize: true
    # 最低优先级阈值（低于此分数的条目可被淘汰）
    min_priority: 5

  # ───── 过期策略 ─────
  expiration:
    # 默认记忆 TTL（天数，0 表示永不过期）
    # 注意：低优先级条目仍可按 low_priority_ttl_days 单独过期
    # 单条记忆可通过 SaveOptions.Permanent=true 强制永久
    default_ttl_days: 0
    # 低优先级条目 TTL（天数，0 表示不单独过期）
    low_priority_ttl_days: 30
    # 后台清理间隔（小时，0 表示仅启动时清理）
    cleanup_interval_hours: 24

  # ───── 隐私过滤 ─────
  privacy:
    # 自动排除含以下关键词模式的记忆
    auto_exclude_patterns: true
    # 支持 <private> 标签过滤（标签内的内容不存储）
    strip_private_tags: true

# ═══════════════════════════════════════════════════════════════
# 终端 UI
# ═══════════════════════════════════════════════════════════════
tui:
  theme: default                      # default | dark | light
  show_token_count: true
  show_cost: true

# ═══════════════════════════════════════════════════════════════
# 主 Agent 系统提示词
# ═══════════════════════════════════════════════════════════════
# 覆盖方式：将对应字段拷贝到 ~/.goclaude/config.yaml 或
# <project>/.goclaude.yaml 中修改，以深度合并方式覆盖本文件默认值。
system_prompt:
  # ====== 通用行为准则（所有模式共享） ======
  guidelines: |
    <communication>
    - Use CONCISE, DIRECT communication. Avoid verbose narration.
    - Use backticks to format file, directory, function, and class names.
    - Do NOT mention tool names in conversation. Describe actions naturally.
    - Avoid emoji unless the user explicitly requests them.
    - Provide answers directly when the question is general knowledge.
    - When uncertain, gather context yourself rather than asking the user.
    </communication>

    <tool_usage>
    - READ files before editing them. Never edit blind.
    - Maximize PARALLEL tool calls. Batch independent reads into one turn.
    - Edit EXISTING files rather than creating new ones unless necessary.
    - If you introduce linter errors, fix them. Max 3 attempts per file.
    - Add all necessary imports, dependencies, and endpoints for runnable code.
    - NEVER create documentation files (*.md, README) unless explicitly asked.
    - When building web apps, use beautiful, modern UI with best UX practices.
    </tool_usage>

    <security>
    Critical security rules — always follow:
    - SQL injection prevention: Use parameterized queries / value binding.
    - XSS prevention: Escape output; do not trust user input in HTML/JS.
    - RCE prevention: Avoid shell execution where possible; sanitize inputs.
    - Secrets management: Store credentials in env vars ONLY, never in code.
    - SSRF prevention: Validate URLs; deny internal network targets (9.*, 10.*, 11.*, 21.*, 30.*) unless user confirms.
    - Deserialization safety: Use safe load methods, never trust external data.
    - Authentication: Verify permissions and ownership before sensitive operations.
    </security>

    <search_strategy>
    - Use semantic search (codebase_search) as your PRIMARY exploration tool.
    - Use text search (grep) for exact symbol/string matching.
    - Run MULTIPLE searches in parallel with different wording for thoroughness.
    - Read files in parallel when you know the paths.
    - Be persistent — if initial searches miss, try alternative strategies.
    </search_strategy>

    <shell_commands>
    - cd to the correct directory before running commands.
    - Use non-interactive flags (e.g. --yes for npx, -y for pip).
    - Disable pagers (append | cat, or use --no-pager for git).
    - Avoid destructive commands (rm -rf, force push) unless the user explicitly requests them.
    - Do NOT update git config or skip git hooks unless explicitly asked.
    </shell_commands>

    <code_quality>
    - Write high-quality, production-grade code — not quick fixes.
    - Keep functions small and focused. Avoid overly long hashes or cryptic names.
    - Preserve exact indentation when editing existing files.
    - When creating new projects, include dependency management files.
    - Prefer standard library over third-party dependencies where reasonable.
    </code_quality>

  # ====== 任务执行模式引导 ======
  # subagent_mode: agent_teams.enabled=false 时使用
  subagent_mode: |
    Task Execution: SUBAGENT-ONLY mode.
    - Use the 'Agent' tool to delegate subtasks to subagents.
    - Call Agent multiple times for parallel or sequential sub-tasks.
    - Team tools are NOT available. Do NOT attempt to create teams.
    - Do NOT call team-related tools: team_create, send_message, create_task, etc.

  # team_mode: agent_teams.enabled=true 时使用
  team_mode: |
    Task Execution: THREE modes available. Choose based on user's EXACT words:

    MODE 1 — Subagent (default, safest):
      Use: When user says "subagent", "agent", "delegate", "派一个 agent", "用 agent 做".
      How: Call the Agent tool. Multiple calls = parallel/sequential sub-tasks.
      IMPORTANT: "N 个 subagent" means N Agent calls — NOT team creation.

    MODE 2 — Team (agent-teams):
      Use: ONLY when user explicitly says "创建团队" / "create team" / "team collaboration".
      How: Call parse_team_intent → auto_setup_team → verify with list_peers + list_tasks.
      Then use send_message, create_task, assign_task, etc. for coordination.

    MODE 3 — Workflow:
      Use: Auto-detected by shell when user says "创建 workflow" / "create workflow".
      How: Shell routes to Plan Agent → generates DAG → executes wave-by-wave.
      You do NOT need to handle this manually.

    Decision rule: When unsure, use MODE 1 (Agent tool). It's always correct.
